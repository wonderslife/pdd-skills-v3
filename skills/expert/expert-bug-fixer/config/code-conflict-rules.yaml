### 规则6: CSS优先级冲突检测（CSS_SPECIFICITY_CONFLICT）

**严重级别**: 🟢 LOW  
**检测目标**: 样式覆盖问题

**常见场景**:

```css
/* 全局样式 */
.delete-button {
  color: #F56C6C;
  pointer-events: auto;
}

/* 组件样式（可能被覆盖） */
.el-button--danger {
  color: #F56C6C;  /* 可能被更高优先级的样式覆盖 */
}

/* 行内样式（最高优先级，但难以维护） */
style="pointer-events: none;"  /* ⚠️ 会覆盖CSS类中的设置 */
```

**检测要点**:
- [ ] 是否使用了 `!important`（避免使用）
- [ ] 行内样式是否与CSS类冲突
- [ ] scoped样式是否被全局样式覆盖
- [ ] 动态绑定的class是否与静态class冲突

