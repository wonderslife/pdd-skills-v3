## 🛠️ 自动化检测工具

### 检测脚本（Node.js版）

```javascript
/**
 * 代码冲突检测器 v2.0
 * 用法: node conflict-detector.js <target-file>
 */

const fs = require('fs');
const path = require('path');

class ConflictDetector {
  constructor(filePath) {
    this.filePath = filePath;
    this.content = fs.readFileSync(filePath, 'utf-8');
    this.lines = this.content.split('\n');
    this.conflicts = [];
  }

  detectAll() {
    this.detectDuplicateMethods();
    this.detectDuplicateVariables();
    this.detectAmbiguousCalls();
    this.detectLifecycleHooks();
    this.detectEventModifiers();
    
    return {
      filePath: this.filePath,
      totalConflicts: this.conflicts.length,
      conflicts: this.conflicts,
      summary: this.generateSummary()
    };
  }

  detectDuplicateMethods() {
    const methodPattern = /^\s*(?:async\s+)?(\w+)\s*\(/gm;
    const methods = new Map();
    
    let match;
    while ((match = methodPattern.exec(this.content)) !== null) {
      const methodName = match[1];
      const lineNum = this.content.substring(0, match.index).split('\n').length;
      
      if (methods.has(methodName)) {
        methods.get(methodName).push({
          line: lineNum,
          signature: this.lines[lineNum - 1].trim()
        });
        
        this.conflicts.push({
          type: 'DUPLICATE_METHOD',
          severity: 'HIGH',
          methodName: methodName,
          locations: methods.get(methodName),
          suggestion: `发现${methods.get(methodName).length}个同名方法"${methodName}"，可能导致覆盖`
        });
      } else {
        methods.set(methodName, [{
          line: lineNum,
          signature: this.lines[lineNum - 1].trim()
        }]);
      }
    }
  }

  detectDuplicateVariables() {
    // 检测data/props/computed中的同名属性
    // （实现略）
  }

  detectAmbiguousCalls() {
    // 检测v-for中的索引变量歧义
    // （实现略）
  }

  detectLifecycleHooks() {
    const lifecycleHooks = ['created', 'mounted', 'beforeMount', 'updated', 'beforeUpdate', 'destroyed', 'beforeDestroy'];
    const hookCounts = {};
    
    lifecycleHooks.forEach(hook => {
      const pattern = new RegExp(`^\\s*${hook}\\s*\\(`, 'gm');
      const matches = this.content.match(pattern);
      if (matches && matches.length > 1) {
        hookCounts[hook] = matches.length;
        
        this.conflicts.push({
          type: 'LIFECYCLE_HOOK_DUPLICATE',
          severity: 'MEDIUM',
          hookName: hook,
          count: matches.length,
          suggestion: `${hook}钩子定义了${matches.length}次，后者会覆盖前者`
        });
      }
    });
  }

  detectEventModifiers() {
    // 检测可能的修饰符误用
    // （实现略）
  }

  generateSummary() {
    const bySeverity = {
      HIGH: this.conflicts.filter(c => c.severity === 'HIGH').length,
      MEDIUM: this.conflicts.filter(c => c.severity === 'MEDIUM').length,
      LOW: this.conflicts.filter(c => c.severity === 'LOW').length
    };

    return {
      total: this.conflicts.length,
      highRisk: bySeverity.HIGH,
      mediumRisk: bySeverity.MEDIUM,
      lowRisk: bySeverity.LOW,
      recommendation: bySeverity.HIGH > 0 ? 
        '🔴 存在高风险冲突，必须修复后再继续' :
        bySeverity.MEDIUM > 0 ?
        '⚠️ 存在中风险冲突，建议修复' :
        '✅ 未检测到明显冲突'
    };
  }
}

// 使用示例
if (process.argv[2]) {
  const detector = new ConflictDetector(process.argv[2]);
  const result = detector.detectAll();
  console.log(JSON.stringify(result, null, 2));
} else {
  console.log('Usage: node conflict-detector.js <file-path>');
}
```

