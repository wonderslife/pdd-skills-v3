## 🎯 集成到Bug修复流程

### 何时执行检测？

```
Step 1: 定位与复现
  │
  ├─ 1.1 提取Bug三要素
  ├─ 1.2 定位涉及文件
  ├─ 1.3 🔍 执行代码冲突检测 ← 新增步骤
  │   └─ 运行conflict-detector.js
  │   └─ 生成检测报告
  │   └─ 如有高风险冲突 → 先解决冲突再继续
  └─ 1.4 确认Bug类别

Step 2: 五维影响分析
  ...
```

### 如何处理检测结果？

| 检测结果 | 处理方式 | 说明 |
|---------|---------|------|
| **无冲突** | ✅ 继续正常流程 | 理想状态 |
| **仅低风险** | ⚠️ 记录并继续 | 可后续优化 |
| **有中风险** | ⚠️ 评估影响后决定 | 如果与当前Bug相关则修复 |
| **有高风险** | 🔴 必须先修复 | 预防引入新问题 |

