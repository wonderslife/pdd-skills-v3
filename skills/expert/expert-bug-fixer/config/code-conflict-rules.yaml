### 规则2: 同名变量检测（DUPLICATE_VARIABLE）

**严重级别**: 🟡 MEDIUM  
**检测目标**: data()、computed、props中的属性名

**检测逻辑**:
```javascript
// 常见冲突场景
data() {
  return {
    fileList: [],        // 定义点A
    internalDecisions: [] // 定义点B
  }
},
computed: {
  fileList() { ... }     // ⚠️ 与data中的fileList同名！
}
```

**Vue 2优先级**: `props > data > computed > methods`  
如果同名，后定义的会覆盖先定义的（或导致警告）

**检查项**:
- [ ] data()中是否有重复属性名
- [ ] computed属性是否与data/props冲突
- [ ] props是否与data冲突
- [ ] 组件内部变量是否与外部传入的props同名

---

### 规则3: 歧义调用检测（AMBIGUOUS_CALL）

**严重级别**: 🔴 HIGH  
**检测目标**: 模板中的方法/事件调用

**检测场景**:

#### 场景A: v-for中的作用域混淆

```html
<!-- ❌ 问题代码 -->
<template v-for="(item, index) in list">
  <div v-for="(subItem, scope) in item.subList">
    <!-- 这里的index是外层还是内层的？ -->
    <button @click="removeItem(index, scope.$index)">删除</button>
  </div>
</template>

<!-- ✅ 明确命名 -->
<template v-for="(item, itemIndex) in list">
  <div v-for="(subItem, subIndex) in item.subList">
    <button @click="removeItem(itemIndex, subIndex)">删除</button>
  </div>
</template>
```

#### 场景B: slot-scope变量遮蔽

```html
<!-- ❌ 可能的问题 -->
<el-table-column label="操作">
  <template slot-scope="scope">
    <el-button @click="handleEdit(scope.row)">编辑</el-button>
    <!-- 如果外部也有scope变量，会产生混淆 -->
  </template>
</el-table-column>

<!-- ✅ 使用明确的变量名 -->
<el-table-column label="操作">
  <template slot-scope="{ row, $index }">
    <el-button @click="handleEdit(row, $index)">编辑</el-button>
  </template>
</el-table-column>
```

