### 规则4: 生命周期钩子冲突（LIFECYCLE_HOOK_CONFLICT）

**严重级别**: 🟡 MEDIUM  
**检测目标**: Vue组件的生命周期钩子函数

**常见问题**:

```javascript
// ❌ 多次定义相同钩子（后者会覆盖前者）
created() {
  this.fetchData();  // 这个不会执行
},
created() {          // 覆盖了上面的
  this.initForm();
},

// ✅ 合并到一个钩子中
created() {
  this.fetchData();
  this.initForm();
},
```

**检测命令**:
```bash
# 检查是否有重复的生命周期钩子
grep -n "^\s*(created|mounted|beforeMount|updated|beforeUpdate|destroyed|beforeDestroy)\s*\(" target-file.vue
```

---

### 规则5: 事件修饰符误用检测（EVENT_MODIFIER_MISUSE）

**严重级别**: 🟡 MEDIUM  
**检测目标**: Vue模板中的事件绑定

**误用模式库**:

| 修饰符 | 误用场景 | 正确用法 | 风险说明 |
|--------|---------|---------|---------|
| `.native` | 用于非原生HTML元素（如el-button） | 仅用于自定义组件且确定需要监听原生事件 | Vue 2中el-button不需要.native |
| `.stop` | 不必要地阻止冒泡 | 仅当父元素有同类事件处理器时使用 | 可能影响其他交互 |
| `.prevent` | 用于非表单提交事件 | 主要用于form submit | 阻止默认行为导致意外行为 |
| `.once` | 用于需要多次触发的事件 | 仅用于一次性操作（如初始化加载） | 导致后续操作无响应 |
| `.self` | 误用于事件委托场景 | 仅当需要区分自身和子元素触发时使用 | 过滤掉有效的事件 |

**自动检测脚本**:
```javascript
// 在浏览器控制台执行，检测潜在问题
function detectEventModifierIssues() {
  const issues = [];
  const buttons = document.querySelectorAll('el-button, [class*="el-button"]');
  
  buttons.forEach(btn => {
    // 检查是否有不必要的.native修饰符
    if (btn.getAttribute('onclick-native') || 
        btn.outerHTML.includes('@click.native')) {
      issues.push({
        element: btn,
        type: 'UNNECESSARY_NATIVE',
        message: 'el-button通常不需要.native修饰符',
        risk: 'MEDIUM'
      });
    }
  });
  
  return issues;
}
```

