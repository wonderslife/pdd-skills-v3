# 代码冲突检测规则 / Code Conflict Detection Rules

> **版本**: 2.0.0
> **目标**: 在Bug修复前自动检测潜在的代码冲突，预防引入新问题
> **触发时机**: Step 1（定位与复现）阶段，在修改代码之前执行

---

## 🔍 检测规则清单

### 规则1: 同名方法检测（DUPLICATE_METHOD）

**严重级别**: 🔴 HIGH  
**检测目标**: JavaScript/Vue文件中的方法定义

**检测逻辑**:
```javascript
// 搜索模式
grep -n "^\s*(async\s+)?(\w+)\s*\(" target-file.vue | grep -E "(methodName1|methodName2)"

// 示例：检测removeResolutionFile
// 预期发现：
Line 823:   removeResolutionFile(decisionIndex, fileIndex) {
Line 1066:  removeResolutionFile(index) {
```

**风险评估**:

| 发现数量 | 风险等级 | 处理建议 |
|---------|---------|---------|
| 0个 | ✅ 安全 | 无需处理 |
| 1个 | ✅ 安全 | 正常情况 |
| 2个 | ⚠️ 中风险 | 检查参数签名是否不同 |
| 3个+ | 🔴 高风险 | 必须重构，重命名或合并 |

**解决方案模板**:
```markdown
## 检测到同名方法冲突

### 冲突详情
- **方法名**: `{{methodName}}`
- **定义位置**: 
  - Line {{line1}}: `{{signature1}}`
  - Line {{line2}}: `{{signature2}}`
- **调用位置**: Line {{callSite}}

### 影响分析
JavaScript中后定义的方法会覆盖先前的同名方法。当前情况下：
- 实际生效的是 Line {{lastDefined}} 的版本
- Line {{earlierDefined}} 的版本被覆盖
- 如果参数签名不同，可能导致运行时错误

### 推荐方案
✅ **方案A**: 重命名其中一个方法（推荐）
```javascript
// 将 Line {{line2}} 的方法改为：
{{newMethodName}}({{params2}}) {
  // ...
}

// 同时更新所有调用处
@click="{{newMethodName}}({{args2}}"
```

⚠️ **方案B**: 合并两个方法（如果功能相似）
```javascript
// 统一接口
{{methodName}}(param1, param2 = undefined) {
  if (param2 !== undefined) {
    // 场景1的逻辑
  } else {
    // 场景2的逻辑（兼容单参数调用）
  }
}
```

❌ **方案C**: 保持现状（不推荐）
- 仅当确认不会产生问题时使用
- 必须添加详细注释说明设计意图
```

