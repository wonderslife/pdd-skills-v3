## 🎬 决策流程图

```
开始评估修复方案
  │
  ├─► 计算各维度得分
  │   ├─ 复杂度风险 (权重20%)
  │   ├─ 兼容性风险 (权重25%)
  │   ├─ 副作用风险 (权重25%)
  │   ├─ 可回滚性 (权重15%)
  │   └─ 测试覆盖度 (权重15%)
  │
  ├─► 计算加权总分
  │   └─ Total = Σ(score_i × weight_i)
  │
  ├─► 判断风险等级
  │   ├─ ≥ 8.0 → ✅ 低风险，强烈推荐
  │   ├─ 7.0-7.9 → ✅ 中低风险，推荐采用
  │   ├─ 6.0-6.9 → ⚠️ 中等风险，需缓解措施
  │   ├─ 4.0-5.9 → 🔴 较高风险，不建议或重大改进
  │   └─ < 4.0 → 💀 极高风险，禁止采用
  │
  └─► 输出决策建议
      ├─ 推荐采用 → 生成测试计划和回滚方案
      ├─ 有条件采用 → 列出必须满足的前提条件
      └─ 不推荐 → 提供替代方案或优化建议
```

