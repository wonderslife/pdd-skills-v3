### 维度4: 可回滚性（ROLLBACKABILITY）

**定义**: 如果修复失败，能否快速恢复到修复前状态

**评级标准**:

| 等级 | 标准 | 回滚时间 | 示例 |
|------|------|---------|------|
| ✅ **EXCELLENT** | 纯代码替换，无副作用 | < 1分钟 | 修改常量值、修正拼写错误 |
| ✅ **GOOD** | 局部改动，影响可控 | 1-5分钟 | 修改单个方法的实现 |
| ⚠️ **FAIR** | 需要数据库回滚或配置还原 | 5-30分钟 | 修改字段类型、添加索引 |
| ❌ **POOR** | 涉及数据迁移或不可逆操作 | > 30分钟 | 删除表字段、重构API |

**回滚方案模板**:
```markdown
### 回滚步骤

**回滚复杂度**: {{complexity}}  
**预计耗时**: {{estimatedTime}}

#### Step 1: 代码回滚
```bash
# Git回滚（如果已提交）
git revert <commit-hash>

# 或手动回滚（如果未提交）
# 将以下文件恢复到修改前：
# - {{file1}}
# - {{file2}}
```

#### Step 2: 数据回滚（如需要）
```sql
-- 如果有数据库变更
-- 执行回滚SQL脚本
ROLLBACK;
-- 或执行预准备的回滚语句
UPDATE table SET field = old_value WHERE condition;
```

#### Step 3: 配置回滚（如需要）
```bash
# 还原配置文件
cp config.yml.backup config.yml
# 重启服务
systemctl restart myapp
```

#### Step 4: 验证回滚
- [ ] 确认已恢复到修复前状态
- [ ] 核心功能正常
- [ ] 无残留影响
```

