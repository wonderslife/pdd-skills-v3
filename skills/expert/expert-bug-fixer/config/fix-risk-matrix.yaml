# 修复方案风险评估矩阵 / Fix Proposal Risk Assessment Matrix

> **版本**: 2.0.0
> **目标**: 在实施修复前评估方案风险，预防引入新问题
> **触发时机**: Step 3（精准修复）阶段，选择修复方案时执行

---

## 🎯 评估维度

### 维度1: 复杂度风险（COMPLEXITY_RISK）

**定义**: 修复方案的代码复杂度是否合理

**评分标准**:

| 等级 | 分数 | 判定标准 | 示例 |
|------|------|---------|------|
| ✅ LOW | 1-2分 | 单行修改，逻辑清晰 | `this.flag = true` |
| ⚠️ MEDIUM | 3-5分 | 多行修改，简单条件判断 | 添加if/else分支 |
| 🔴 HIGH | 6-8分 | 引入新概念，复杂逻辑 | 重构数据结构、引入新依赖 |
| 💀 CRITICAL | 9-10分 | 架构变更，影响范围大 | 改用新的状态管理方案 |

**计算公式**:
```
复杂度分数 = 基础分 + 新增代码行数/10 + 条件分支数×2 + 新增依赖数×3
```

**示例计算**:
```javascript
// 方案A: 直接splice（LOW - 2分）
this.form.internalDecisions[decisionIndex].resolutionFiles.splice(fileIndex, 1);
// 分数: 1(基础) + 0(1行<10) + 0(无分支) + 0(无依赖) = 1分 ✅

// 方案B: 使用$set+filter（MEDIUM - 4分）
const newFiles = this.form.internalDecisions[decisionIndex].resolutionFiles.filter((_, idx) => idx !== fileIndex);
this.$set(this.form.internalDecisions[decisionIndex], 'resolutionFiles', newFiles);
// 分数: 1(基础) + 0(2行<10) + 1(filter算1个分支) + 0(无依赖) = 2分 ✅

// 方案C: 引入新状态管理（HIGH - 7分）
import { createStore } from 'vuex';
const store = createStore({ ... });
// 分数: 1(基础) + 0 + 0 + 3(新增1个依赖) = 4分（但架构影响大，人工调高至7分）⚠️
```

---

### 维度2: 兼容性风险（COMPATIBILITY_RISK）

**定义**: 修复方案是否与现有系统兼容

**检查项清单**:

| # | 检查项 | 权重 | 风险点 |
|---|--------|------|--------|
| 2.1 | 浏览器兼容性 | 20% | 是否使用了新版API？旧浏览器支持吗？ |
| 2.2 | Vue版本兼容 | 25% | 是否使用了Vue 2.7+/Vue 3特性？项目版本支持吗？ |
| 2.3 | 第三方库兼容 | 20% | 是否升级了依赖？是否有breaking change？ |
| 2.4 | 若依框架约定 | 20% | 是否违反了框架的编码规范？ |
| 2.5 | 向后兼容性 | 15% | 是否会影响现有功能？历史数据是否兼容？ |

**常见不兼容模式**:

```javascript
// ❌ 高风险：使用可选链操作符（Vue 2不支持）
const fileName = this.detail?.internalDecisions?.[0]?.resolutionFiles?.[0]?.fileName;
// → Vue 2编译错误或需要@babel/plugin-proposal-optional-chaining

// ✅ 低安全：使用传统方式
const fileName = this.detail && 
                  this.detail.internalDecisions && 
                  this.detail.internalDecisions[0] && 
                  this.detail.internalDecisions[0].resolutionFiles && 
                  this.detail.internalDecisions[0].resolutionFiles[0] ?
                  this.detail.internalDecisions[0].resolutionFiles[0].fileName : 
                  null;

// ❌ 高风险：使用.native修饰符（el-button不需要）
<el-button @click.native="handleClick">点击</el-button>
// → 可能导致事件无法触发或行为异常

// ✅ 低风险：普通@click
<el-button @click="handleClick">点击</el-button>

// ❌ 高风险：修改核心数据结构
// 将 internalDecisions 从字符串改为对象数组
// → 影响所有读写该字段的代码，需全面回归测试

// ✅ 低风险：在现有结构上扩展
// 保持JSON格式，增加新字段
// → 向后兼容，旧数据不受影响
```

---

### 维度3: 副作用风险（SIDE_EFFECT_RISK）

**定义**: 修复方案是否会引发连锁反应

**副作用类型**:

| 类型 | 描述 | 检测方法 | 风险等级 |
|------|------|---------|---------|
| **状态污染** | 修改了全局/shared状态 | 检查是否修改了Vuex store、eventBus | 🔴 HIGH |
| **DOM泄漏** | 未清理的事件监听器/定时器 | 检查beforeDestroy钩子 | 🟡 MEDIUM |
| **内存泄漏** | 循环引用、闭包占用 | 检查大型数组的引用关系 | 🟡 MEDIUM |
| **性能退化** | O(n²)算法、频繁重渲染 | 检查v-for的key、computed vs methods | 🟢 LOW |
| **样式冲突** | scoped样式泄漏 | 检查CSS选择器优先级 | 🟢 LOW |

**检测脚本**:
```javascript
// 副作用快速检测
function detectSideEffects(fixCode) {
  const warnings = [];
  
  // 检测全局状态修改
  if (fixCode.includes('this.$store') || fixCode.includes('Vuex.Store')) {
    warnings.push({
      type: 'STATE_POLLUTION',
      severity: 'HIGH',
      message: '修改了Vuex全局状态，可能影响其他组件'
    });
  }
  
  // 检测事件监听器添加
  if (fixCode.includes('.addEventListener') && !fixCode.includes('.removeEventListener')) {
    warnings.push({
      type: 'DOM_LEAK',
      severity: 'MEDIUM',
      message: '添加了事件监听器但未看到对应的移除代码'
    });
  }
  
  // 检测定时器
  if ((fixCode.includes('setInterval') || fixCode.includes('setTimeout')) && 
      !fixCode.includes('clearInterval') && !fixCode.includes('clearTimeout')) {
    warnings.push({
      type: 'MEMORY_LEAK',
      severity: 'MEDIUM',
      message: '创建了定时器但未看到清除代码'
    });
  }
  
  return warnings;
}
```

