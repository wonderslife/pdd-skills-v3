## 🎯 最佳实践总结

### ✅ 推荐做法

1. **严格按顺序执行Node** - 不要跳跃，每一步都要验证
2. **每个Node都记录证据** - 保存控制台截图、日志输出
3. **遇到不确定时停下来思考** - 不要盲目尝试多个方案
4. **利用用户协作** - 让用户提供关键调试信息
5. **复用已验证的模式** - 参考相似问题的解决路径

### ❌ 避免陷阱

1. **不要跳过基础检查** - 很多"复杂问题"其实是简单原因（disabled、拼写错误）
2. **不要过度依赖经验** - "这看起来像Vue响应式问题"可能是错误的
3. **不要同时修改多处** - 一次只改一个地方，便于定位有效改动
4. **不要忽略用户反馈** - "点击没反应"比"Vue响应式问题"更有价值
5. **不要忘记清理调试代码** - console.log不应出现在生产代码中

