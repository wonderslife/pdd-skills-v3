## 🔧 特殊场景决策树

### 场景A: 页面空白/白屏

```
START: 用户报告页面空白
  │
  ├─► A1: 控制台有编译错误？
  │   └─► Yes → 修复编译错误（语法、导入等）
  │   └─► No → A2
  │
  ├─► A2: 路由配置正确？
  │   └─► No → 检查router/index.js
  │   └─► Yes → A3
  │
  ├─► A3: 组件加载失败？
  │   └─► Network面板有404/500 → 检查资源路径
  │   └─► 无网络错误 → A4
  │
  └─► A4: 数据加载异常？
      └─► API返回错误 → 检查后端日志
      └─► API正常 → 检查数据渲染逻辑(v-if/v-for)
```

### 场景B: 数据不显示

```
START: 数据存在但不显示
  │
  ├─► B1: 数据确实存在？
  │   └─► Console打印data → 确认数据非空
  │   └─► 数据为空 → B5（数据加载问题）
  │
  ├─► B2: v-for遍历正确？
  │   └─► 检查数组 vs 对象 → 对象需Object.keys()
  │   └─► v-for正常 → B3
  │
  ├─► B3: 条件渲染正确？
  │   └─► v-if表达式求值 → 应该为true
  │   └─► v-if为false → 修复条件表达式
  │
  └─► B4: 样式隐藏？
      └─► display:none / visibility:hidden / opacity:0
      └─► 修复CSS样式
      
  └─► B5: 数据加载问题
      ├─► API未调用 → 检查created/mounted生命周期
      ├─► API调用失败 → 检查Network面板
      └─► 数据映射错误 → 检查字段名大小写
```

### 场景C: 表单提交失败

```
START: 表单提交后无反应或报错
  │
  ├─► C1: 表单验证通过？
  │   └─► No → 检查rules校验规则
  │   └─► Yes → C2
  │
  ├─► C2: 提交方法被调用？
  │   └─► No → 检查@click绑定
  │   └─► Yes → C3
  │
  ├─► C3: API请求发出？
  │   └─► Network面板无请求 → 代码抛异常（检查Console）
  │   └─► 有请求 → C4
  │
  ├─► C4: 后端返回成功？
  │   └─► 4xx/5xx错误 → 检查后端日志
  │   └─► 200 OK → C5
  │
  └─► C5: 前端处理响应？
      └─► then/catch分支 → 检查回调逻辑
      └─► 成功提示未显示 → 检查this.$message调用
```

