# PDD Configuration
project:
  name: ""
  version: "1.0.0"
  description: ""
  template: ruoyi

ide:
  type: trae
  skills_dir: .trae/skills
  rules_dir: .trae/rules

pdd:
  features:
    output_dir: specs/features
    naming_pattern: "FP-{module}-{id}-{name}"
  spec:
    output_dir: specs
    template: default
    include_tests: true
  verify:
    dimensions:
      - completeness
      - correctness
      - consistency
    auto_fix: false

linter:
  enabled: true
  types:
    - code
    - prd
    - sql
    - activiti
  fail_on_error: false
  report_format: markdown

hooks:
  enabled: true
  events:
    - session_start
    - pre_feature
    - post_feature

cache:
  enabled: true
  ttl: 3600
  max_size: 100

logging:
  level: info
