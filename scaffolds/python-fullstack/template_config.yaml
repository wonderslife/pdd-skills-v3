name: python-fullstack
display_name: "Python FastAPI + Vue3 全栈脚手架"
version: "0.1.0"
description: |
  PDD 集成式全栈脚手架模板，基于 PRD 文档自动生成项目代码。
  
  核心能力:
  - FastAPI 异步后端 (Python 3.11+)
  - Vue3 + Vite + TypeScript 前端
  - 数据权限引擎 (组织级隔离 + 借调合并)
  - OAuth2 统一认证 (企微/钉钉/飞书/微信/OIDC)
  - 工作流引擎 (状态机 + 会签 + 条件分支)
  - 响应式自适应 (PC/H5 同代码库)

tech_stack:
  backend:
    language: "python"
    version: "3.11+"
    framework: "fastapi"
    database: "mysql"
    orm: "sqlalchemy[asyncio]"
  frontend:
    language: "typescript"
    framework: "vue3"
    build_tool: "vite"
    css_framework: "tailwindcss"

features:
  - name: "data_permission"
    display_name: "数据权限引擎"
    description: "组织级数据隔离，支持借调委派合并"
    enabled: true
    config:
      mode: "hybrid"
      delegation_enabled: true

  - name: "oauth_sso"
    display_name: "OAuth2 单点登录"
    description: "多源OAuth统一认证（6个平台）"
    enabled: true
    providers:
      - wecom
      - dingtalk
      - feishu
      - wechat_open
      - wechat_mini
      - oidc

  - name: "workflow_engine"
    display_name: "工作流引擎"
    description: "状态机驱动的审批流程引擎"
    enabled: true
    config:
      states_count: 15
      sign_strategies:
        - all_pass
        - any_pass
        - ratio_pass
        - leader_pass

  - name: "responsive_ui"
    display_name: "响应式前端"
    description: "PC/H5 自适应，6档断点系统"
    enabled: true
    breakpoints: [xs, sm, md, lg, xl, xxl]

directories:
  backend:
    root: "backend/"
    app: "backend/app/"
    core: "backend/app/core/"
    models: "backend/app/models/"
    schemas: "backend/app/schemas/"
    api: "backend/app/api/v1/"
    tests: "backend/app/tests/"

  frontend:
    root: "frontend/"
    src: "frontend/src/"
    views: "frontend/src/views/"
    stores: "frontend/src/stores/"
    composables: "frontend/src/composables/"
    api: "frontend/src/api/"

hooks:
  post_generate:
    - step: "init_database"
      description: "初始化数据库连接与迁移"
      command: |
        cd {{output_dir}}/backend
        pip install -r requirements.txt
        alembic init alembic
        alembic revision --autogenerate -m "initial"
        alembic upgrade head

    - step: "install_frontend_deps"
      description: "安装前端依赖"
      command: |
        cd {{output_dir}}/frontend
        npm ci

    - step: "docker_setup"
      description: "生成 Docker 编排文件"
      template: "docker-compose.yml.j2"

templates:
  crud_module:
    source: "templates/crud/"
    output: "{{module_name}}/"
    variables:
      - module_name
      - table_name
      - fields[]
  workflow_definition:
    source: "templates/workflow/"
    output: "workflows/{{def_code}}/"
    variables:
      - def_code
      - def_name
      - nodes[]

design_docs:
  - path: "docs/01-architecture.md"
    title: "PDD-Scaffold 总体架构设计"
  - path: "docs/02-data-permission.md"
    title: "数据权限模块设计"
  - path: "docs/03-workflow-engine.md"
    title: "工作流引擎设计"
  - path: "docs/04-mobile-oauth.md"
    title: "移动端适配 & OAuth2 设计"

metadata:
  author: "PDD-Scaffold Team"
  license: "MIT"
  created_at: "2026-04-12"
  pdd_compatible_version: ">=3.0.0"
  min_python_version: "3.11"
  min_node_version: "18.0.0"
